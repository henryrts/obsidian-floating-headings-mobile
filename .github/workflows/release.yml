name: Publish plugin release

on:
  push:
    branches: [main]
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify plugin files
        run: node scripts/verify.mjs

      - name: Read version
        id: manifest
        shell: bash
        run: echo "version=$(node -p \"require('./manifest.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.manifest.outputs.version }}
        shell: bash
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists."
          else
            gh release create "$VERSION" \
              main.js manifest.json styles.css \
              --title "$VERSION" \
              --notes "Initial mobile-compatible release. Tap-to-open navigation, touch-sized controls, outside-tap dismissal, and responsive mobile layout."
          fi

      - name: Confirm issue-triggered publication
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          VERSION: ${{ steps.manifest.outputs.version }}
        shell: bash
        run: gh issue comment "$ISSUE_NUMBER" --body "Release $VERSION is published with manifest.json, main.js, and styles.css."
